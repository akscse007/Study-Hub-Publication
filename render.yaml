# Render Blueprint — frontend static site.
# The SPA rewrite below is the fix for "Not Found" on refresh/direct URL:
# every non-file path must serve index.html so React Router can resolve it.
#
# If the static site was created manually in the Render dashboard (not via
# this Blueprint), apply the same rule under Settings → Redirects/Rewrites:
#   Source: /*   Destination: /index.html   Action: Rewrite
services:
  - type: web
    name: study-hub-client
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
